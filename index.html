<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petshop</title>
    <link rel="stylesheet" href="./css/index.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <h1>Merolla</h1>
            <p>Apasionados por tu mascota</p>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Buscar...">
            <button>🔍</button>
        </div>
        <div class="contact">
            <p>📱 11 3333 6666</p>
            <div class="cart">🛒</div>
        </div>
    </header>

    <!-- CATEGORÍAS -->
    <nav class="categories">
        <div class="category">
            <img src="./img/gato.jpg" alt="Gatos">
            <p>GATOS</p>
        </div>
        <div class="category">
            <img src="./img/perro.jpg" alt="Perros">
            <p>PERROS</p>
        </div>
        <div class="category">
            <img src="./img/aves.jpg" alt="Aves">
            <p>AVES</p>
        </div>
        <div class="category">
            <img src="./img/peces.jpg" alt="Peces">
            <p>PECES</p>
        </div>
        <div class="category">
            <img src="./img/cobayo.jpg" alt="Pequeños Animales">
            <p>PEQANIMALES</p>
        </div>
        <div class="category">
            <img src="./img/reptil.jpg" alt="Reptiles">
            <p>REPTILES</p>
        </div>
    </nav>

    <!-- CARRUSEL -->
    <section class="carousel">
        <div class="carousel-container">
            <div class="carousel-item">
                <div class="promo">
                    <h2>HASTA EL 50% OFF EN LA 2DA UNIDAD</h2>
                    <button>COMPRAR</button>
                </div>
                <img src="product1.png" alt="Producto 1">
            </div>
            <div class="carousel-item">
                <img src="product2.png" alt="Producto 2">
            </div>
            <div class="carousel-item">
                <img src="product3.png" alt="Producto 3">
            </div>
        </div>
        <div class="carousel-controls">
            <button class="prev">⬅</button>
            <button class="next">➡</button>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2024 Petshop Merolla - Todos los derechos reservados.</p>
    </footer>
    <script src="./js/index.js"></script>
</body>
</html>
